version: '3.8'

networks:
  steam_net:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    networks:
      - steam_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # CAMBIO AQUÍ: Escuchamos en todas partes y nos anunciamos como 'kafka'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx1024m -Xms512m"
    depends_on:
      - zookeeper
    networks:
      - steam_net

  mongodb:
    image: mongo:6.0
    command: ["--wiredTigerCacheSizeGB", "1"]
    ports:
      - "27017:27017"
    networks:
      - steam_net

  nifi:
    image: apache/nifi:1.23.2
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=SuperSteam1234!
      - NIFI_JVM_HEAP_INIT=1g
      - NIFI_JVM_HEAP_MAX=2g
      - NIFI_WEB_PROXY_HOST=18.209.32.247:8443,*
    networks:
      - steam_net

  jupyter-spark:
    image: jupyter/pyspark-notebook:latest
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_OPTS=--driver-memory 1g --executor-memory 1g
    user: root
    volumes:
      - ./scripts:/home/jovyan/work
    networks:
      - steam_net
